# Nginx site config for richpicture.ronz.link
# Place at: /etc/nginx/sites-available/richpicture.ronz.link
# Enable:   sudo ln -s /etc/nginx/sites-available/richpicture.ronz.link \
#                      /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP → HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name richpicture.ronz.link;
    return 301  https://$host$request_uri;
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name richpicture.ronz.link;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/richpicture.ronz.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/richpicture.ronz.link/privkey.pem;

    # Proxy to Vite dev server
    location / {
        proxy_pass         http://192.168.5.83:5173;
        proxy_http_version 1.1;

        # Vite HMR uses WebSockets — must upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived connections alive for HMR
        proxy_read_timeout 86400;
    }
}
